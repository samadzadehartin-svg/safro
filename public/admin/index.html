<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('safro-theme');
          var legacy = localStorage.getItem('safarro_three_panels_dark') === '1';
          var theme = saved === 'dark' || (!saved && legacy) ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <title>سفرو | پنل مدیریت</title>
    <meta name="theme-color" content="#202D59" />
    <link rel="manifest" href="../manifest.json" />
    <link rel="stylesheet" href="../assets/css/icons-local.css?v=8.3-local-assets-20260721" />
    <link rel="stylesheet" href="../assets/css/style.css?v=8.3-local-assets-20260721" />
    <link rel="stylesheet" href="../assets/css/safro-v8.css?v=8.3-local-assets-20260721" />
  </head>
  <body class="admin-page panel-page">
    <div id="headerMount"></div>
    <main class="container" id="app"></main>
    <div id="footerMount"></div>
    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      (function() {
        var version = 'safro-8.3-local-assets-20260721';
        window.SAFRO_BUILD_VERSION = version;
        try {
          if (localStorage.getItem('safro-app-version') !== version) {
            localStorage.setItem('safro-app-version', version);
            if (window.caches) caches.keys().then(function(keys) { return Promise.all(keys.map(function(k) { return caches.delete(k); })); });
            if (navigator.serviceWorker) navigator.serviceWorker.getRegistrations().then(function(regs) { regs.forEach(function(r) { r.update(); if (r.active) r.active.postMessage({ type: 'CLEAR_SAFRO_CACHES' }); }); });
          }
        } catch(e) {}
      })();
    </script>
    <script src="../assets/js/data.js?v=8.3-local-assets-20260721"></script>
    <script src="../assets/js/core.js?v=8.3-local-assets-20260721"></script>
    <script src="../assets/js/admin.js?v=8.3-local-assets-20260721"></script>
    <script src="../assets/js/ui-enhancements.js?v=8.3-local-assets-20260721"></script>
    <script src="../assets/js/safro-v8.js?v=8.3-local-assets-20260721"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () =>
          navigator.serviceWorker.register('../sw.js').catch(() => {})
        );
      }
    </script>
  </body>
</html>
