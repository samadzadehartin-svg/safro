<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="mist" x1="800" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity=".58"/>
      <stop offset=".46" stop-color="#000000" stop-opacity=".42"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="skyLine" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity=".08"/>
      <stop offset=".5" stop-color="#000000" stop-opacity=".23"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".08"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
