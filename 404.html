<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سفرو | انتقال به صفحه اصلی</title>
    <meta name="theme-color" content="#202D59" />
    <script>
      var path = window.location.pathname || '';
      var parts = path.split('/').filter(Boolean);
      var isProjectPages = /\.github\.io$/i.test(window.location.hostname) && parts.length > 0;
      var base = isProjectPages ? '/' + parts[0] + '/' : '/';
      var target = 'buyer/';
      if (parts.indexOf('staff') >= 0) target = 'staff/';
      if (parts.indexOf('admin') >= 0) target = 'admin/';
      window.location.replace(base + target + (window.location.hash || ''));
    </script>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Tahoma,sans-serif;background:#f8fafc;color:#202D59;text-align:center;padding:24px}a{color:#202D59;font-weight:800}
    </style>
  </head>
  <body>
    <main>
      <h1>در حال انتقال...</h1>
      <p>اگر خودکار منتقل نشدی، <a href="./buyer/">اینجا کلیک کن</a>.</p>
    </main>
  </body>
</html>
