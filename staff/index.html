<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>سفر رو | پنل کارمند</title><meta name="theme-color" content="#4a9fd8"><link rel="manifest" href="../manifest.json"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/style.css"></head><body><div id="headerMount"></div><main class="container" id="app"></main><div id="footerMount"></div><div id="toast" class="toast"></div><script src="../assets/js/data.js"></script><script src="../assets/js/core.js"></script><script src="../assets/js/staff.js"></script></body></html>
<div id="modal" class="modal" onclick="if(event.target===this)closeForm()"><div class="modal-card pad"><div class="row"><h2 id="formTitle">افزودن تور</h2><button class="soft" onclick="closeForm()">بستن</button></div><form onsubmit="saveTour(event)" class="stack"><input id="tid" type="hidden"><div class="grid g2"><input id="title" class="field" required placeholder="عنوان تور"><input id="dest" class="field" required placeholder="مقصد"><input id="duration" class="field" required placeholder="مدت سفر"><input id="airline" class="field" required placeholder="ایرلاین"><input id="price" class="field" type="number" required placeholder="قیمت پایه"><input id="img" class="field" placeholder="عکس اصلی URL"><select id="type" class="field"><option value="international">خارجی</option><option value="domestic">داخلی</option></select><select id="level" class="field"><option value="">سطح ندارد</option><option value="luxury">لوکس</option><option value="economy">اقتصادی</option><option value="special">ویژه</option></select><select id="status" class="field"><option value="active">فعال</option><option value="inactive">غیرفعال</option></select><label class="row" style="justify-content:flex-start"><input id="lastMinute" type="checkbox"> لحظه آخری</label></div><h3>هتل‌ها</h3><div class="grid g3"><div class="info"><small>هتل ۳ ستاره</small><input id="h3name" class="field" placeholder="نام"><input id="h3price" class="field" type="number" placeholder="قیمت"><input id="h3cap" class="field" type="number" placeholder="ظرفیت"></div><div class="info"><small>هتل ۴ ستاره</small><input id="h4name" class="field" placeholder="نام"><input id="h4price" class="field" type="number" placeholder="قیمت"><input id="h4cap" class="field" type="number" placeholder="ظرفیت"></div><div class="info"><small>هتل ۵ ستاره</small><input id="h5name" class="field" placeholder="نام"><input id="h5price" class="field" type="number" placeholder="قیمت"><input id="h5cap" class="field" type="number" placeholder="ظرفیت"></div></div><textarea id="dates" class="field" rows="3" placeholder="تاریخ‌ها، هر خط یک تاریخ"></textarea><textarea id="gallery" class="field" rows="3" placeholder="عکس‌های گالری، هر خط یک URL"></textarea><textarea id="desc" class="field" rows="2" placeholder="توضیحات تور"></textarea><textarea id="itinerary" class="field" rows="3" placeholder="برنامه سفر، هر خط یک روز"></textarea><textarea id="docs" class="field" rows="2" placeholder="مدارک لازم"></textarea><textarea id="includes" class="field" rows="2" placeholder="خدمات شامل"></textarea><textarea id="excludes" class="field" rows="2" placeholder="خدمات غیرشامل"></textarea><input id="cancel" class="field" placeholder="قوانین کنسلی"><input id="child" class="field" placeholder="شرایط کودک"><button class="btn" type="submit">ذخیره تور</button></form></div></div>
