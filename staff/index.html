<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>سفر رو | پنل کارمند</title><meta name="theme-color" content="#4a9fd8"><link rel="manifest" href="../manifest.json"><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css">
</head><body><div id="headerMount"></div><main class="container" id="app"></main><div id="footerMount"></div><div id="toast" class="toast"></div><script src="../assets/js/data.js"></script><script src="../assets/js/core.js"></script><script src="../assets/js/staff.js"></script></body></html>
<div id="modal" class="modal" onclick="if(event.target===this)closeForm()"><div class="modal-card pad"><div class="row"><h2 id="formTitle">افزودن تور</h2><button class="soft" onclick="closeForm()">بستن</button></div><form onsubmit="saveTour(event)" class="stack"><input id="tid" type="hidden"><div class="grid g2"><input id="title" class="field" required placeholder="عنوان تور"><input id="dest" class="field" required placeholder="مقصد"><input id="duration" class="field" required placeholder="مدت سفر"><input id="airline" class="field" required placeholder="ایرلاین رفت"><input id="returnAirline" class="field" placeholder="ایرلاین برگشت"><input id="flightNumber" class="field" placeholder="شماره پرواز رفت"><input id="flightTime" class="field" placeholder="زمان پرواز رفت"><input id="returnFlightTime" class="field" placeholder="زمان پرواز برگشت"><input id="price" class="field" type="number" required placeholder="قیمت پایه"><input id="img" class="field" placeholder="عکس اصلی URL"><select id="type" class="field"><option value="international">خارجی</option><option value="domestic">داخلی</option></select><select id="level" class="field"><option value="">سطح ندارد</option><option value="luxury">لوکس</option><option value="economy">اقتصادی</option><option value="special">ویژه</option></select><select id="status" class="field"><option value="active">فعال</option><option value="inactive">غیرفعال</option></select><label class="row" style="justify-content:flex-start"><input id="lastMinute" type="checkbox"> نمایش در قسمت ویژه</label><input id="dealPercent" class="field" type="number" placeholder="درصد تخفیف ویژه"><input id="dealEndsAtLocal" class="field" type="datetime-local" placeholder="پایان تایمر ویژه"></div><div class="section-toggle"><b>بخش هتل‌ها</b><label><input id="visHotels" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><div id="hotelEditor"></div><div class="section-toggle"><b>بخش تاریخ‌های حرکت</b><label><input id="visDates" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="dates" class="field" rows="3" placeholder="تاریخ‌ها، هر خط یک تاریخ"></textarea><div class="section-toggle"><b>بخش گالری تصاویر</b><label><input id="visGallery" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="gallery" class="field" rows="3" placeholder="عکس‌های گالری، هر خط یک URL"></textarea><div class="section-toggle"><b>بخش توضیحات تور</b><label><input id="visDescription" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="desc" class="field" rows="2" placeholder="توضیحات تور"></textarea><div class="section-toggle"><b>بخش اطلاعات پرواز</b><label><input id="visFlightInfo" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><div class="section-toggle"><b>بخش برنامه سفر</b><label><input id="visItinerary" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="itinerary" class="field" rows="3" placeholder="برنامه سفر، هر خط یک روز"></textarea><div class="section-toggle"><b>بخش مدارک لازم</b><label><input id="visDocs" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="docs" class="field" rows="2" placeholder="مدارک لازم"></textarea><div class="section-toggle"><b>بخش خدمات شامل</b><label><input id="visIncludes" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="includes" class="field" rows="2" placeholder="خدمات شامل"></textarea><div class="section-toggle"><b>بخش خدمات غیرشامل</b><label><input id="visExcludes" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><textarea id="excludes" class="field" rows="2" placeholder="خدمات غیرشامل"></textarea><div class="section-toggle"><b>بخش قوانین کنسلی</b><label><input id="visCancellation" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><input id="cancel" class="field" placeholder="قوانین کنسلی"><div class="section-toggle"><b>بخش شرایط کودک</b><label><input id="visChildPolicy" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><input id="child" class="field" placeholder="شرایط کودک"><div class="section-toggle"><b>بخش نظر مسافران</b><label><input id="visReviews" type="checkbox" checked> نمایش این بخش در پنل خریدار</label></div><button class="btn" type="submit">ذخیره تور</button></form></div></div>
