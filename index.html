<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سفرو | در حال انتقال...</title>
    <meta name="theme-color" content="#4a9fd8" />
    <meta
      name="description"
      content="سامانه هوشمند سفرو برای مشاهده، مقایسه و رزرو تورهای داخلی و خارجی"
    />
    <meta name="robots" content="index,follow" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./assets/images/logo-safaro.png" />
    <link rel="apple-touch-icon" href="./assets/images/logo-safaro.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css"
    />
    <style>
      :root {
        --primary: #4a9fd8;
        --gold: #f3b63a;
        --bg: #f0f4fa;
        --text: #0f2740;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background:
          radial-gradient(circle at 85% 15%, rgba(74, 159, 216, 0.18), transparent 28%),
          radial-gradient(circle at 15% 80%, rgba(243, 182, 58, 0.16), transparent 26%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family: Vazirmatn, Tahoma, sans-serif;
        color: var(--text);
        text-align: center;
        padding: 24px;
      }
      .splash-card {
        width: min(420px, 100%);
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(203, 213, 225, 0.75);
        border-radius: 28px;
        padding: 30px 24px;
        box-shadow: 0 24px 70px rgba(16, 42, 67, 0.1);
        backdrop-filter: blur(16px);
      }
      .logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        margin-bottom: 16px;
        border-radius: 22px;
        background: #fff;
        border: 1px solid rgba(226, 232, 240, 0.9);
        padding: 6px;
      }
      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid var(--primary);
        border-bottom-color: transparent;
        border-radius: 50%;
        animation: rotation 1s linear infinite;
        margin: 18px auto 0;
      }
      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      h1 {
        font-size: 24px;
        margin: 0 0 8px;
        font-weight: 1000;
      }
      p {
        margin: 0;
        color: #4a647c;
        font-weight: 800;
        line-height: 2;
      }
      a {
        color: var(--primary);
        font-weight: 1000;
        text-decoration: none;
      }
    </style>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
          window.location.replace('./buyer/');
        }, 350);
      });
    </script>
  </head>
  <body>
    <main class="splash-card">
      <img class="logo" src="./assets/images/logo-safaro.png" alt="Safaro logo" />
      <h1>سفرو</h1>
      <p>در حال بارگذاری سامانه هوشمند سفر...</p>
      <div class="loader" aria-label="در حال بارگذاری"></div>
      <noscript>
        <p style="margin-top: 18px"><a href="./buyer/">ورود به سایت</a></p>
      </noscript>
    </main>
  </body>
</html>
